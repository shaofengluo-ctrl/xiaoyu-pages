<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小羽 | 记忆拼图沙盒 (Memory Jigsaw Sandbox)</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --success-color: #2ea043;
            --error-color: #f85149;
            --node-bg: #161b22;
            --node-border: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .header {
            position: absolute;
            top: 2rem;
            text-align: center;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }

        .header p {
            color: #8b949e;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .jigsaw-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            width: 100%;
            max-width: 900px;
            margin-top: 2rem;
            position: relative;
            z-index: 5;
        }

        .node-card {
            background: var(--node-bg);
            border: 1px solid var(--node-border);
            border-radius: 12px;
            padding: 2rem;
            width: 300px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .node-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-color);
            opacity: 0.5;
        }

        .node-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 32px var(--accent-glow);
        }

        .node-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8b949e;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .node-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            margin: 0 0 1rem 0;
            word-break: break-word;
        }

        .node-aliases {
            font-size: 0.85rem;
            color: #8b949e;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .alias-tag {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .relation-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            position: relative;
            width: 250px;
        }

        /* Ghost line connecting nodes */
        .ghost-line {
            position: absolute;
            top: 50%;
            left: -320px;
            right: -320px;
            height: 2px;
            background: repeating-linear-gradient(90deg, transparent, transparent 5px, rgba(88, 166, 255, 0.3) 5px, rgba(88, 166, 255, 0.3) 10px);
            z-index: -1;
            opacity: 0.5;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 0.5rem;
        }

        input[type="text"] {
            background: #010409;
            border: 1px solid var(--node-border);
            color: #fff;
            padding: 0.8rem 1rem;
            border-radius: 6px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input[type="text"]::placeholder {
            color: #484f58;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        button {
            background: var(--node-bg);
            border: 1px solid var(--node-border);
            color: var(--text-color);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        button.primary {
            background: var(--success-color);
            border-color: var(--success-color);
            color: #fff;
            font-weight: 600;
        }

        button.primary:hover {
            background: #3fb950;
            border-color: #3fb950;
            box-shadow: 0 0 10px rgba(46, 160, 67, 0.4);
        }

        button:hover:not(.primary) {
            background: #30363d;
            border-color: #8b949e;
        }

        .feedback {
            margin-top: 1rem;
            font-size: 0.9rem;
            text-align: center;
            min-height: 20px;
            width: 100%;
        }

        .feedback.error {
            color: var(--error-color);
            animation: shake 0.4s;
        }

        .feedback.success {
            color: var(--success-color);
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* Success Animation Elements */
        .solidified-line {
            position: absolute;
            top: 50%;
            left: -320px;
            right: -320px;
            height: 4px;
            background: var(--success-color);
            box-shadow: 0 0 15px var(--success-color);
            z-index: -1;
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .sim-badge {
            position: absolute;
            top: -12px;
            background: #1f2428;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 1px;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #8b949e;
            text-decoration: none;
