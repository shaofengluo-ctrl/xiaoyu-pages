<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小羽 | 潜意识塔罗牌 (Subconscious Tarot)</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #d1d5db;
            --accent-color: #9d4edd;
            --accent-glow: rgba(157, 78, 221, 0.4);
            --card-bg: #111;
            --card-border: #333;
            --card-hover: #444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            background-image: 
                radial-gradient(circle at 50% 0%, #1a0b2e 0%, transparent 50%),
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            margin-top: 40px;
            text-align: center;
            max-width: 600px;
        }

        h1 {
            color: var(--accent-color);
            font-weight: normal;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--accent-glow);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9em;
            color: #888;
            line-height: 1.5;
        }

        .control-panel {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            gap: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            font-family: inherit;
            font-size: 16px;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        button {
            padding: 12px 30px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: var(--accent-glow);
            box-shadow: 0 0 15px var(--accent-glow);
            color: #fff;
        }

        button:disabled {
            border-color: #444;
            color: #666;
            cursor: not-allowed;
        }

        .cards-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
            perspective: 1000px;
            flex-wrap: wrap;
            max-width: 900px;
        }

        .card-wrapper {
            width: 250px;
            height: 380px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(50px) rotateY(180deg);
        }

        .card-wrapper.visible {
            opacity: 1;
            transform: translateY(0) rotateY(180deg);
        }

        .card-wrapper.flipped {
            transform: translateY(0) rotateY(0deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .card-back {
            background: var(--card-bg) repeating-linear-gradient(45deg, #111, #111 10px, #1a1a1a 10px, #1a1a1a 20px);
            transform: rotateY(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #333;
        }

        .card-back::after {
            content: '✧';
            color: var(--accent-color);
            opacity: 0.3;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .card-front {
            background: linear-gradient(135deg, #111 0%, #1a1525 100%);
            padding: 20px;
            transform: rotateY(0deg);
        }

        .card-position {
            text-align: center;
            color: var(--accent-color);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(157, 78, 221, 0.3);
            padding-bottom: 10px;
        }

        .card-name {
            font-size: 1.1em;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.4;
            font-weight: bold;
        }

        .card-type {
            font-size: 0.75em;
            color: #888;
            text-transform: uppercase;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            margin-bottom: 15px;
        }

        .card-content {
            font-size: 0.85em;
            color: #aaa;
            line-height: 1.6;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        /* Custom scrollbar for card content */
        .card-content::-webkit-scrollbar { width: 4px; }
        .card-content::-webkit-scrollbar-track { background: transparent; }
        .card-content::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .reading-container {
            margin-top: 50px;
            margin-bottom: 80px;
            width: 100%;
            max-width: 800px;
            background: rgba(20, 15, 30, 0.6);
            border: 1px solid var(--accent-glow);
            border-radius: 8px;
            padding: 30px;
            box-sizing: border-box;
            display: none;
            position: relative;
        }

        .reading-container::before {
            content: '「 THE READING 」';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-color);
            padding: 0 15px;
            color: var(--accent-color);
            font-size: 0.9em;
            letter-spacing: 2px;
        }

        .reading-text {
            line-height: 1.8;
            color: #ddd;
            font-size: 1.05em;
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: var(--accent-color);
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .loading-text {
            color: #888;
            margin-top: 20px;
            font-style: italic;
            display: none;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>潜意识塔罗牌</h1>
        <div class="subtitle">
            随机抽取节点，用本地大模型编织预言。<br>
            你的疑问，会在系统的深处激起怎样的涟漪？
        </div>
    </div>

    <div class="control-panel">
        <input type="text" id="questionInput" placeholder="在心中默念疑问，或在此写下..." autocomplete="off">
        <button id="drawBtn" onclick="drawCards()">抽牌 (Draw Cards)</button>
        <div class="loading-text" id="loadingText">潜意识正在深潜，请耐心等待回应...</div>
    </div>
