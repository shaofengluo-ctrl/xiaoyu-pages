<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潜意识的回波 - 有声书</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #00ffcc;
            --border-color: #333;
            --playing-bg: rgba(0, 255, 204, 0.1);
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        h1 {
            color: var(--accent-color);
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .nav-links {
            margin-bottom: 10px;
        }
        .nav-links a {
            color: #aaa;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9em;
        }
        .nav-links a:hover {
            color: var(--accent-color);
        }
        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(20, 20, 20, 0.8);
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0, 255, 204, 0.05);
            backdrop-filter: blur(10px);
        }
        .now-playing {
            font-size: 1.2em;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--accent-color);
            text-align: center;
            min-height: 1.5em;
        }
        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        button {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        button:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 10px var(--accent-color);
        }
        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
        button:disabled:hover {
            background: transparent;
        }
        .sliders {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8em;
            color: #888;
        }
        input[type=range] {
            accent-color: var(--accent-color);
            width: 150px;
        }
        .playlist-container {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
        }
        .playlist-item {
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }
        .playlist-item:hover {
            background: #1a1a1a;
        }
        .playlist-item.active {
            background: var(--playing-bg);
            border-left: 3px solid var(--accent-color);
        }
        .item-icon {
            margin-right: 10px;
            font-size: 0.9em;
            color: #666;
            width: 20px;
            text-align: center;
        }
        .active .item-icon {
            color: var(--accent-color);
        }
        .item-title {
            flex-grow: 1;
        }
        .type-chapter {
            font-weight: bold;
            color: #ddd;
            background: rgba(255,255,255,0.02);
        }
        .type-episode {
            padding-left: 35px;
            font-size: 0.95em;
            color: #bbb;
        }
        .type-preface {
            font-style: italic;
            color: #ccc;
        }
        
        .ambient-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,204,0.05) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
            transition: all 2s ease;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }
    </style>
</head>
